# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0-dev.2/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0-dev.2/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: 1.5.0

app: golem-rag-rust

environments:
  local:
    server: local
#    componentPresets: debug
    componentPresets: release
  cloud:
    server: cloud
    componentPresets: release
components:
  golem-rust:rag:
    dir: ""
    templates: rust
    config:
      db:
        host: "localhost" #"{{ POSTGRES_HOST }}"
        db: "golem_rag" #"{{ POSTGRES_DB }}"
        port: "5432" #"{{ POSTGRES_PORT }}"
      s3:
        region: "us-east-1" #"{{ AWS_DEFAULT_REGION }}"
        endpoint_url: "http://localhost:9000" #"{{ S3_ENDPOINT_URL }}"
      embedding:
        provider: "ollama" #"{{ EMBEDDING_PROVIDER }}"
        api_base: "http://localhost:11434" #"{{ EMBEDDING_API_BASE }}"
        model: "nomic-embed-text" #"{{ EMBEDDING_MODEL }}"


    # Component environment variables can reference system environment variables with minijinja syntax:
    #
    #   env:
    #     ENV_VAR_1: "{{ ENV_VAR_1 }}"
    #     RENAMED_VAR_2: "{{ ENV_VAR_2 }}"
    #     COMPOSED_VAR_3: "{{ ENV_VAR_3 }}-{{ ENV_VAR_4}}"
    #
    env:
      # RAG System Environment Variables
#      # Database Configuration
#      POSTGRES_HOST: "{{ POSTGRES_HOST }}"
#      POSTGRES_DB: "{{ POSTGRES_DB }}"
#      POSTGRES_USER: "{{ POSTGRES_USER }}"
#      POSTGRES_PASSWORD: "{{ POSTGRES_PASSWORD }}"
#      POSTGRES_PORT: "{{ POSTGRES_PORT }}"
#
#      # S3/RustFS Configuration
#      AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID }}"
#      AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY }}"
#      AWS_DEFAULT_REGION: "{{ AWS_DEFAULT_REGION }}"
#      S3_ENDPOINT_URL: "{{ S3_ENDPOINT_URL }}"
#
#      # Embedding Configuration
#      EMBEDDING_PROVIDER: "{{ EMBEDDING_PROVIDER }}"
#      EMBEDDING_API_BASE: "{{ EMBEDDING_API_BASE }}"
#      EMBEDDING_API_KEY: "{{ EMBEDDING_API_KEY }}"
#      EMBEDDING_MODEL: "{{ EMBEDDING_MODEL }}"

      # Application Configuration
      RUST_LOG: "{{ RUST_LOG }}"


# Secret defaults for local development - these are NOT used in production environments
# Production secrets must be created via: golem agent-secret create <path> --secret-type <type> --secret-value <value>
secretDefaults:
  local:
    db:
      user: "{{ POSTGRES_USER }}"
      password: "{{ POSTGRES_PASSWORD }}"
    s3:
      access_key_id: "{{ AWS_ACCESS_KEY_ID }}"
      secret_access_key: "{{ AWS_SECRET_ACCESS_KEY }}"
    embedding:
      api_key: "{{ EMBEDDING_API_KEY }}"

mcp:
  deployments:
    local:
      - domain: localhost:9007
        agents:
          SearchAgent: {}
          DocumentAgent: {}
httpApi:
  deployments:
    local:
    - domain: localhost:9006
      agents:
        SearchAgent: {}
        DocumentAgent: {}
        S3DocumentLoaderAgent: {}
        S3DocumentSyncAgent: {}
        EmbeddingGeneratorAgent: {}
        DocumentEmbeddingGeneratorAgent: {}
