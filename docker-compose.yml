version: '3.8'

services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: golem-rag-postgres
    environment:
      POSTGRES_DB: golem_rag
      POSTGRES_USER: golem_user
      POSTGRES_PASSWORD: golem_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golem_user -d golem_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS S3-compatible storage
  rustfs:
    image: rustfs/rustfs:latest
    container_name: golem-rag-rustfs
    environment:
      RUSTFS_DATA_DIR: /data
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin123
      RUSTFS_REGION: us-east-1
      RUSTFS_BUCKET: golem-documents
      RUSTFS_ADDR: 0.0.0.0:9000
      RUSTFS_LOG_LEVEL: info
    ports:
      - "9000:9000"  # S3 API port
    volumes:
      - rustfs_data:/data
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Ollama for embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: golem-rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RustFS setup for bucket initialization
  rustfs-setup:
    image: alpine:latest
    container_name: golem-rag-rustfs-setup
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin123
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://rustfs:9000
    networks:
      - golem-rag-network
    entrypoint: >
      /bin/sh -c "
      apk add --no-cache curl &&
      sleep 5 &&
      curl -X PUT http://rustfs:9000/golem-documents \
        -H 'Host: golem-documents.rustfs:9000' \
        -H 'Content-Length: 0' \
        -H 'Authorization: AWS4-HMAC-SHA256 Credential=rustfsadmin/20240101/us-east-1/s3/aws4_request, SignedHeaders=host;x-amz-date, Signature=placeholder' \
        -v &&
      echo 'RustFS bucket created successfully'
      "

  # Ollama setup for embedding model
  ollama-setup:
    image: ollama/ollama:latest
    container_name: golem-rag-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - golem-rag-network
    entrypoint: >
      /bin/sh -c "
      ollama pull nomic-embed-text &&
      echo 'Embedding model downloaded successfully'
      "

volumes:
  postgres_data:
    driver: local
  rustfs_data:
    driver: local
  ollama_data:
    driver: local

networks:
  golem-rag-network:
    driver: bridge
