services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: golem-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-compatible storage (better compatibility than RustFS)
  minio:
    image: minio/minio:latest
    container_name: golem-rag-minio
    environment:
      MINIO_ROOT_USER: rustfsadmin
      MINIO_ROOT_PASSWORD: rustfsadmin123
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "${RUSTFS_PORT}:9000"  # S3 API port
      - "9001:9001"           # Console port
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001" --anonymous
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Ollama for embeddings
  ollama:
    image: ollama/ollama:latest
    container_name: golem-rag-ollama
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
    networks:
      - golem-rag-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO setup for bucket initialization
  minio-setup:
    image: minio/mc:latest
    container_name: golem-rag-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=rustfsadmin
      - AWS_SECRET_ACCESS_KEY=rustfsadmin123
      - AWS_DEFAULT_REGION=us-east-1
    networks:
      - golem-rag-network
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      mc alias set minio http://minio:9000 rustfsadmin rustfsadmin123 &&
      mc mb minio/golem-documents &&
      echo 'MinIO bucket created successfully'
      "

  # Ollama setup for embedding model
  ollama-setup:
    image: ollama/ollama:latest
    container_name: golem-rag-ollama-setup
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - golem-rag-network
    entrypoint: >
      /bin/sh -c "
      ollama pull ${OLLAMA_MODEL} &&
      echo 'Embedding model downloaded successfully'
      "

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  ollama_data:
    driver: local

networks:
  golem-rag-network:
    driver: bridge
