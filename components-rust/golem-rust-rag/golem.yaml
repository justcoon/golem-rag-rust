# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.4.2/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.4.2/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

httpApi:
  definitions:
    golem-rust-rag-api:
      version: '0.0.1'
      routes:
        # Basic search endpoint
        - method: POST
          path: /search
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let query: string = request.body.query;
              let limit = request.body.limit;
              let threshold = request.body.threshold;
              let agent = search-agent();
              let results = agent.search(query, limit, threshold);
              { status: 200, body: { results: results } }

        # Search with filters endpoint
        - method: POST
          path: /search/filters
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let query: string = request.body.query;
              let filters = request.body.filters;
              let limit: option<u64> = request.body.limit;
              let threshold: option<f32> = request.body.threshold;
              let agent = search-agent();
              let results = agent.search-with-filters(query, filters, limit, threshold);
              { status: 200, body: { results: results } }

        # Find similar documents endpoint
        - method: POST
          path: /search/similar
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let document_id: string = request.body.document_id;
              let limit: option<u64> = request.body.limit;
              let agent = search-agent();
              let results = agent.find-similar-documents(document_id, limit);
              { status: 200, body: { results: results } }

        # Document management endpoints
#        - method: GET
#          path: /documents/{document_id}
#          binding:
#            type: default
#            componentName: golem-rust:rag
#            response: |
#              let document_id: string = request.path.document_id;
#              let agent = document-agent();
#              let document = agent.get-document(document_id);
#              match document {
#                Some(doc) => { status: 200, body: { document: doc } },
#                None => { status: 404, body: { error: "Document not found" } }
#              }
#
#        - method: GET
#          path: /documents
#          binding:
#            type: default
#            componentName: golem-rust:rag
#            response: |
#              let filters = request.query.filters;
#              let limit: option<u64> = request.query.limit;
#              let agent = document-agent();
#              let documents = agent.list-documents(filters, limit);
#              { status: 200, body: { documents: documents } }

        # S3 document loading endpoints
        - method: POST
          path: /s3/load/{namespace}
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let namespace: string = request.path.namespace;
              let agent = s3-document-loader-agent();
              let document_ids = agent.load-documents-from-namespace(namespace);
              { status: 200, body: { loaded_documents: document_ids } }

        - method: GET
          path: /s3/list/{namespace}
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let namespace: string = request.path.namespace;
              let agent = s3-document-loader-agent();
              let documents = agent.list-namespace-documents(namespace);
              { status: 200, body: { documents: documents } }

        # Embedding generation endpoints
        - method: POST
          path: /embeddings/generate/{document_id}
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let document_id: string = request.path.document_id;
              let agent = embedding-generator-agent();
              let count = agent.generate-embeddings-for-document(document_id);
              { status: 200, body: { embeddings_generated: count } }

        - method: GET
          path: /embeddings/status/{document_id}
          binding:
            type: default
            componentName: golem-rust:rag
            response: |
              let document_id: string = request.path.document_id;
              let agent = embedding-generator-agent();
              let status = agent.get-embedding-status(document_id);
              { status: 200, body: { status: status } }

  deployments:
    local:
      - domain: golem-rag-rust.localhost:9006
        definitions:
          - golem-rust-rag-api

components:
  golem-rust:rag:
    templates: rust

    # Component environment variables can reference system environment variables with minijinja syntax:
    #
    #   env:
    #     ENV_VAR_1: "{{ ENV_VAR_1 }}"
    #     RENAMED_VAR_2: "{{ ENV_VAR_2 }}"
    #     COMPOSED_VAR_3: "{{ ENV_VAR_3 }}-{{ ENV_VAR_4}}"
    #
    env:
      # RAG System Environment Variables
      # Database Configuration
      POSTGRES_HOST: "{{ POSTGRES_HOST }}"
      POSTGRES_DB: "{{ POSTGRES_DB }}"
      POSTGRES_USER: "{{ POSTGRES_USER }}"
      POSTGRES_PASSWORD: "{{ POSTGRES_PASSWORD }}"
      POSTGRES_PORT: "{{ POSTGRES_PORT }}"
      
      # S3/RustFS Configuration  
      AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID }}"
      AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY }}"
      AWS_DEFAULT_REGION: "{{ AWS_DEFAULT_REGION }}"
      AWS_S3_BUCKET: "{{ AWS_S3_BUCKET }}"
      S3_ENDPOINT_URL: "{{ S3_ENDPOINT_URL }}"
      
      # Embedding Configuration
      EMBEDDING_PROVIDER: "{{ EMBEDDING_PROVIDER }}"
      EMBEDDING_API_BASE: "{{ EMBEDDING_API_BASE }}"
      EMBEDDING_API_KEY: "{{ EMBEDDING_API_KEY }}"
      EMBEDDING_MODEL: "{{ EMBEDDING_MODEL }}"
      
      # Application Configuration
      RUST_LOG: "{{ RUST_LOG }}"

    # LLM providers
    # -------------

    ## Common
    # GOLEM_LLM_LOG: "trace" # Optional, defaults to warn

    ## Anthropic
    # ANTHROPIC_API_KEY: "<KEY>"

    ## OpenAI
    # OPENAI_API_KEY: "<KEY>"

    ## OpenRouter
    # OPENROUTER_API_KEY: "<KEY>"

    ## Amazon Bedrock
    # AWS_ACCESS_KEY_ID: "<KEY>"
    # AWS_REGION: "<REGION>"
    # AWS_SECRET_ACCESS_KEY: "<KEY>"
    # AWS_SESSION_TOKEN: "<TOKEN>" # Optional

    ## Grok
    # XAI_API_KEY: "<KEY>"

    ## Ollama
    # GOLEM_OLLAMA_BASE_URL: "<URL>" # Optional, defaults to http://localhost:11434


    # Embedding providers
    # -------------------

    ## OpenAI
    # OPENAI_API_KEY: "<KEY>"

    ## Cohere
    # COHERE_API_KEY: "<KEY>"

    ## HuggingFace
    # HUGGING_FACE_API_KEY: "<KEY>"

    ## VoyageAI
    # VOYAGEAI_API_KEY: "<KEY>"


    # Graph database providers
    # ------------------------

    ## ArangoDB
    # ARANGODB_HOST: "<HOST>"
    # ARANGODB_PORT: "<PORT>" # Optional, defaults to 8529
    # ARANGODB_USER: "<USER>"
    # ARANGODB_PASSWORD: "<PASS>"
    # ARANGO_DATABASE: "<DB>"

    ## JanusGraph
    # JANUSGRAPH_HOST: "<HOST>"
    # JANUSGRAPH_PORT: "<PORT>" # Optional, defaults to 8182
    # JANUSGRAPH_USER: "<USER>"
    # JANUSGRAPH_PASSWORD: "<PASS>"

    ## Neo4j
    # NEO4J_HOST: "<HOST>"
    # NEO4J_PORT: "<PORT>" # Optional, defaults to 7687
    # NEO4J_USER: "<USER>"
    # NEO4J_PASSWORD: "<PASS>"


    # Search providers
    # ----------------

    ## Common
    # GOLEM_SEARCH_LOG: "trace" # Optional, defaults to warn

    ## Algolia
